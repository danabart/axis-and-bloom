apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: axis-bloom-backend
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        run.googleapis.com/cloudsql-instances: YOUR_PROJECT:YOUR_REGION:axis-bloom-db
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "10"
    spec:
      containers:
        - image: gcr.io/YOUR_PROJECT/axis-bloom-backend:latest
          ports:
            - containerPort: 4000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "4000"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: axis-bloom-secrets
                  key: DATABASE_URL
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: axis-bloom-secrets
                  key: ANTHROPIC_API_KEY
            - name: SHOPIFY_STORE_DOMAIN
              valueFrom:
                secretKeyRef:
                  name: axis-bloom-secrets
                  key: SHOPIFY_STORE_DOMAIN
            - name: SHOPIFY_STOREFRONT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: axis-bloom-secrets
                  key: SHOPIFY_STOREFRONT_TOKEN
            - name: SHOPIFY_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: axis-bloom-secrets
                  key: SHOPIFY_ADMIN_TOKEN
            - name: FIREBASE_PROJECT_ID
              valueFrom:
                secretKeyRef:
                  name: axis-bloom-secrets
                  key: FIREBASE_PROJECT_ID
            - name: FIREBASE_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: axis-bloom-secrets
                  key: FIREBASE_PRIVATE_KEY
            - name: FIREBASE_CLIENT_EMAIL
              valueFrom:
                secretKeyRef:
                  name: axis-bloom-secrets
                  key: FIREBASE_CLIENT_EMAIL
          resources:
            limits:
              memory: 512Mi
              cpu: "1"
