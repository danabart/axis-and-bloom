<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Axis &amp; Bloom — Flavor Archetype Map</title>
<style>
  body {
    margin: 0;
    background: #1A0F08;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 32px 16px;
  }
  svg {
    width: 100%;
    max-width: 1240px;
    height: auto;
    display: block;
    filter: drop-shadow(0 16px 48px rgba(0,0,0,0.6));
  }
</style>
</head>
<body>
<svg viewBox="0 0 1200 840" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,400&amp;family=EB+Garamond:ital,wght@0,400;0,500;1,400&amp;display=swap');
  </style>

  <!-- Parchment noise -->
  <filter id="parchment">
    <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="4" seed="3" result="noise"/>
    <feColorMatrix type="matrix" values="0 0 0 0 0.75  0 0 0 0 0.62  0 0 0 0 0.42  0 0 0 0.18 0" in="noise" result="tint"/>
    <feBlend in="SourceGraphic" in2="tint" mode="multiply"/>
  </filter>

  <!-- Region texture -->
  <filter id="tex">
    <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="3" seed="8" result="n"/>
    <feColorMatrix type="saturate" values="0" in="n" result="g"/>
    <feBlend in="SourceGraphic" in2="g" mode="multiply"/>
  </filter>

  <!-- Hatch for SE region -->
  <pattern id="hatch-se" width="7" height="7" patternUnits="userSpaceOnUse" patternTransform="rotate(42)">
    <line x1="0" y1="0" x2="0" y2="7" stroke="#4A2C10" stroke-width="0.7" opacity="0.18"/>
  </pattern>

  <!-- Dot pattern for Experimental -->
  <pattern id="exp-dot" width="9" height="9" patternUnits="userSpaceOnUse">
    <circle cx="3" cy="3" r="1.1" fill="#3A1A5A" opacity="0.22"/>
  </pattern>

  <!-- Cross-hatch for CN -->
  <pattern id="hatch-cn" width="9" height="9" patternUnits="userSpaceOnUse" patternTransform="rotate(30)">
    <line x1="0" y1="0" x2="0" y2="9" stroke="#5C3A18" stroke-width="0.5" opacity="0.14"/>
  </pattern>

  <!-- Stipple for Floral -->
  <pattern id="floral-dot" width="8" height="8" patternUnits="userSpaceOnUse">
    <circle cx="4" cy="4" r="0.8" fill="#5A3A8A" opacity="0.15"/>
  </pattern>

  <!-- Axis gradient -->
  <linearGradient id="axis-grad" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#5C2E0C"/>
    <stop offset="40%" stop-color="#B87C38"/>
    <stop offset="65%" stop-color="#C45A40"/>
    <stop offset="85%" stop-color="#8A62B8"/>
    <stop offset="100%" stop-color="#5A38A0"/>
  </linearGradient>

  <!-- Drop shadow for text -->
  <filter id="text-shadow" x="-5%" y="-5%" width="110%" height="110%">
    <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#3A1A08" flood-opacity="0.25"/>
  </filter>

  <!-- Clip for map area -->
  <clipPath id="map-clip">
    <rect x="58" y="78" width="1084" height="616"/>
  </clipPath>
</defs>

<!-- ═══════════════════════════════════════════════ -->
